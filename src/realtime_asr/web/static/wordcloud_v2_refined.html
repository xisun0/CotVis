<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CotVis Live Terms · Refined</title>
    <style>
      :root {
        --bg: #f3efe6;
        --paper: #fffaf0;
        --ink: #1f2a44;
        --muted: #5f6b85;
        --line: #dbcdb2;
        --live: #2f7d4f;
        --warn: #c94b4b;
        --accent: #8a5a44;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(160deg, #f5f1e8 0%, #efe7d7 60%, #eadbc5 100%);
        font-family: "Palatino Linotype", "Book Antiqua", serif;
      }
      .layout {
        max-width: 1180px;
        margin: 20px auto;
        padding: 18px;
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 16px;
      }
      .panel {
        border: 1px solid var(--line);
        background: color-mix(in oklab, var(--paper), white 25%);
        box-shadow: 0 10px 32px #00000014;
        backdrop-filter: blur(3px);
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }
      .title {
        margin: 0;
        font-size: clamp(1.1rem, 2vw, 1.55rem);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: "Avenir Next", "Trebuchet MS", sans-serif;
        font-size: 0.82rem;
        color: var(--muted);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--live);
      }
      .dot.stale { background: var(--warn); }
      .cloud-wrap { padding: 14px; min-height: 68vh; }
      .cloud {
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
        gap: 10px 12px;
      }
      .term {
        line-height: 1;
        padding: 3px 5px;
        border-bottom: 1px solid #00000025;
        transition: font-size .22s ease, opacity .22s ease, color .22s ease;
      }
      .term:nth-child(4n) { color: var(--accent); }
      .term:nth-child(6n) { color: #2f5f8d; }
      .empty {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 1rem;
        font-family: "Avenir Next", "Trebuchet MS", sans-serif;
      }
      .side { padding: 14px; }
      .block + .block { margin-top: 14px; }
      .label {
        margin: 0 0 8px;
        font-family: "Avenir Next", "Trebuchet MS", sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.74rem;
        color: var(--muted);
      }
      .rank {
        list-style: none;
        padding: 0;
        margin: 0;
        font-family: "Avenir Next", "Trebuchet MS", sans-serif;
      }
      .rank li {
        display: grid;
        grid-template-columns: 18px 1fr auto;
        gap: 8px;
        align-items: baseline;
        padding: 4px 0;
        border-bottom: 1px dashed #00000014;
        font-size: 0.9rem;
      }
      .rank .n { color: var(--muted); }
      .rank .w { color: #4a5570; font-variant-numeric: tabular-nums; }
      .foot {
        margin-top: 8px;
        font-family: "Avenir Next", "Trebuchet MS", sans-serif;
        color: var(--muted);
        font-size: 0.82rem;
      }
      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
        .cloud-wrap { min-height: 56vh; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <section class="panel">
        <div class="header">
          <h1 class="title">CotVis Live Terms</h1>
          <div class="meta">
            <span class="dot" id="dot"></span>
            <span id="status">Connecting...</span>
          </div>
        </div>
        <div class="cloud-wrap">
          <div id="cloud" class="cloud"></div>
        </div>
      </section>
      <aside class="panel side">
        <section class="block">
          <p class="label">Top Ranked Terms</p>
          <ol id="rank" class="rank"></ol>
        </section>
        <section class="block">
          <p class="label">Session</p>
          <div id="metaText" class="foot">waiting for stream</div>
        </section>
      </aside>
    </div>

    <script>
      const cloud = document.getElementById("cloud");
      const rank = document.getElementById("rank");
      const status = document.getElementById("status");
      const metaText = document.getElementById("metaText");
      const dot = document.getElementById("dot");

      function fontSize(weight, minW, maxW) {
        if (maxW <= minW) return 22;
        const t = (weight - minW) / (maxW - minW);
        return Math.round(17 + t * 50);
      }

      function render(payload) {
        const terms = Array.isArray(payload.terms) ? payload.terms : [];
        const nowMs = Date.now();
        const tsMs = (payload.ts || 0) * 1000;
        const stale = !tsMs || (nowMs - tsMs) > 7000;

        status.textContent = stale ? "Stale stream" : "Live";
        dot.classList.toggle("stale", stale);

        cloud.innerHTML = "";
        rank.innerHTML = "";

        if (!terms.length) {
          const p = document.createElement("p");
          p.className = "empty";
          p.textContent = "Listening... speak into the microphone.";
          cloud.appendChild(p);
          metaText.textContent = "No terms yet";
          return;
        }

        const weights = terms.map(t => Number(t[1]) || 0);
        const minW = Math.min(...weights);
        const maxW = Math.max(...weights);

        for (const [term, raw] of terms) {
          const w = Number(raw) || 0;
          const span = document.createElement("span");
          span.className = "term";
          span.textContent = term;
          span.style.fontSize = `${fontSize(w, minW, maxW)}px`;
          span.style.opacity = String(0.58 + (maxW === minW ? 0.35 : ((w - minW) / (maxW - minW)) * 0.35));
          cloud.appendChild(span);
        }

        terms.slice(0, 12).forEach((item, i) => {
          const [term, raw] = item;
          const li = document.createElement("li");
          const w = (Number(raw) || 0).toFixed(2);
          li.innerHTML = `<span class="n">${i + 1}</span><span>${term}</span><span class="w">${w}</span>`;
          rank.appendChild(li);
        });

        const updated = tsMs ? new Date(tsMs).toLocaleTimeString() : "--";
        metaText.textContent = `Updated ${updated}; window ${payload.window_sec ?? "?"}s; top ${payload.top_k ?? "?"}`;
      }

      async function refresh() {
        try {
          const res = await fetch(`/terms?t=${Date.now()}`, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          render(data);
        } catch (err) {
          status.textContent = `Waiting (${err})`;
          dot.classList.add("stale");
        }
      }

      refresh();
      setInterval(refresh, 2000);
    </script>
  </body>
</html>
